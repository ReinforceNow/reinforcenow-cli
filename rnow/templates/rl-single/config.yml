project_id: ""
project_name: "OpenMathReasoning"
dataset_id: ""
dataset_type: rl
organization_id: ""
data:
  train_file: train.jsonl
  batch_size: 3
  group_size: 4
  val_split: 0.25
model:
  path: Qwen/Qwen3-8B
  qlora_rank: 32
algorithm:
  loss_fn: ppo
  adv_estimator: grpo
  kl_penalty_coef: 0.01
rollout:
  max_turns: 1
  max_tokens: 2048
  termination_policy: last_tool
trainer:
  num_epochs: 4
  learning_rate: 0.0001
  save_step: 20
  eval_step: 2
